# Kişisel iPhone'a ücretsiz kurulum için İMZASIZ .ipa üretir.
#
# Mantık: Apple Developer Program (ücretli) olmadan cihaz build'i alınamaz; ama
# CODE_SIGNING_ALLOWED=NO ile imzasız bir .app derleyip Payload/ içine koyup
# zip'leyerek .ipa yaparız. Sonra bu .ipa'yı Windows'ta Sideloadly ile ÜCRETSİZ
# Apple ID'nle imzalayıp USB'den telefona kurarsın (7 günde bir yenilemen gerekir).
#
# NOT: Bu resmi bir Expo/EAS akışı DEĞİL. macOS runner (public repo ücretsiz;
# private repo'da macOS dakikaları 10× sayılır). İlk çalıştırmada scheme/pod/xcode
# ayrıntısı düzeltme isteyebilir — loglara bakıp uyarlarız.
#
# Çalıştırma: GitHub → Actions → "iOS unsigned IPA" → Run workflow.
#
# OTA: Bu IPA artık bir EAS Update channel'ı (varsayılan "preview") ile üretilir.
# Kurulumdan SONRA saf-JS değişikliklerini yeniden IPA üretmeden gönderebilirsin:
#   eas update --branch preview -m "mesaj"
# (Native/paket/app.json değişikliğinde yine yeni IPA gerekir.)

name: iOS unsigned IPA

on:
  workflow_dispatch:
    inputs:
      channel:
        description: "EAS Update channel — OTA bu branch'e bağlanır (eas update --branch <channel>)"
        required: false
        default: "preview"

jobs:
  build:
    runs-on: macos-latest
    timeout-minutes: 60
    # EXPO_PUBLIC_* değişkenleri JS bundle'a DERLEME (bundle) anında gömülür.
    # .env dosyası, xcodebuild'in RN bundle aşamasında (expo export:embed) güvenilir
    # okunmuyordu → app'te process.env boş çıkıyordu ("Supabase bağlanamıyor").
    # Çözüm: değişkenleri doğrudan process ORTAMINA vermek (EAS Build'in kendi
    # ortamına enjekte ettiği gibi). Asıl düzeltme bu; aşağıdaki .env adımı yedek.
    env:
      EXPO_PUBLIC_SUPABASE_URL: ${{ secrets.EXPO_PUBLIC_SUPABASE_URL }}
      EXPO_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.EXPO_PUBLIC_SUPABASE_ANON_KEY }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Bağımlılıklar (npm ci)
        run: npm ci

      # EXPO_PUBLIC_* değişkenleri JS bundle'a GÖMÜLÜR. Repo → Settings → Secrets
      # and variables → Actions'a ekle. Eklenmezse app KURULUR ama online özellikler
      # (Supabase) kapalı olur — offline/solo modlar çalışır.
      - name: .env yaz (Supabase)
        run: |
          {
            echo "EXPO_PUBLIC_SUPABASE_URL=${{ secrets.EXPO_PUBLIC_SUPABASE_URL }}"
            echo "EXPO_PUBLIC_SUPABASE_ANON_KEY=${{ secrets.EXPO_PUBLIC_SUPABASE_ANON_KEY }}"
          } > .env

      # ios/ gitignore'lu (CNG) → app.json + plugin'lerden native proje üretilir.
      - name: Prebuild (iOS) + pods
        run: |
          npx expo prebuild --platform ios
          cd ios && pod install

      # OTA (EAS Update) için channel'ı build'e GÖM. `eas build` bunu otomatik yapar;
      # biz ham xcodebuild kullandığımızdan Expo.plist'e elle ekliyoruz. Bu satır olmadan
      # IPA hiçbir `eas update --branch <channel>` güncellemesini GÖREMEZ (channel yoksa
      # istemci hangi branch'ten çekeceğini bilemez). runtimeVersion zaten app.json'dan
      # gömülüyor; channel + runtimeVersion eşleşince OTA çalışır.
      - name: OTA channel'ını Expo.plist'e göm
        env:
          CHANNEL: ${{ inputs.channel }}
        run: |
          set -eo pipefail
          PLIST=$(find ios -name Expo.plist | head -1)
          if [ -z "$PLIST" ]; then
            echo "HATA: Expo.plist bulunamadı — updates yapılandırması eksik olabilir."
            exit 1
          fi
          echo "Expo.plist: $PLIST  |  channel: $CHANNEL"
          # EXUpdatesRequestHeaders dict'i yoksa oluştur (varsa 'Add' hata verir → yok say).
          /usr/libexec/PlistBuddy -c "Add :EXUpdatesRequestHeaders dict" "$PLIST" 2>/dev/null || true
          # expo-channel-name'i ekle; zaten varsa güncelle.
          /usr/libexec/PlistBuddy -c "Add :EXUpdatesRequestHeaders:expo-channel-name string $CHANNEL" "$PLIST" 2>/dev/null \
            || /usr/libexec/PlistBuddy -c "Set :EXUpdatesRequestHeaders:expo-channel-name $CHANNEL" "$PLIST"
          echo "--- Expo.plist (doğrulama) ---"
          /usr/libexec/PlistBuddy -c "Print" "$PLIST"

      # Expo prebuild'de scheme = xcworkspace'in adı. Türkçe karakter olabileceği
      # için sabit yazmıyoruz, otomatik saptıyoruz.
      - name: Scheme + workspace sapta
        id: xc
        run: |
          WS=$(ls -d ios/*.xcworkspace | head -1)
          SCHEME=$(basename "$WS" .xcworkspace)
          echo "workspace=$WS" >> "$GITHUB_OUTPUT"
          echo "scheme=$SCHEME" >> "$GITHUB_OUTPUT"
          echo "workspace=$WS  scheme=$SCHEME"

      - name: Derle (imzasız, cihaz için)
        run: |
          set -o pipefail
          xcodebuild \
            -workspace "${{ steps.xc.outputs.workspace }}" \
            -scheme "${{ steps.xc.outputs.scheme }}" \
            -configuration Release \
            -sdk iphoneos \
            -derivedDataPath build \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY="" \
            build

      - name: .ipa paketle (Payload/ + zip)
        run: |
          APP=$(ls -d build/Build/Products/Release-iphoneos/*.app | head -1)
          echo "App: $APP"
          mkdir -p Payload
          cp -R "$APP" Payload/
          zip -qry app-unsigned.ipa Payload
          ls -lh app-unsigned.ipa

      - name: Artifact yükle
        uses: actions/upload-artifact@v4
        with:
          name: ios-unsigned-ipa
          path: app-unsigned.ipa
          retention-days: 7
